<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAZZ STORE - Top-Up Game</title>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f5f5f5;}
header{background:#4CAF50;color:#fff;text-align:center;padding:20px;}
main{display:flex;justify-content:center;align-items:flex-start;min-height:80vh;padding:20px;}
.topup-form{background:#fff;padding:30px;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.1);width:100%;max-width:600px;}
.topup-form h2{text-align:center;margin-bottom:20px;color:#333;}
label{display:block;margin-top:10px;margin-bottom:5px;color:#555;}
select, input, button{width:100%;padding:10px;border-radius:8px;border:1px solid #ccc;margin-bottom:10px;}
button{background:#4CAF50;color:#fff;border:none;cursor:pointer;transition:.3s;}
button:hover{background:#45a049;}
#confirmation{margin-top:20px;padding:15px;background:#e7f7e7;border-radius:8px;border:1px solid #b2e2b2;text-align:center;display:none;white-space:pre-line;}
.game-box{padding:15px;margin-bottom:10px;background:#e8f5e9;border-radius:10px;cursor:pointer;transition:.3s;}
.game-box:hover{background:#d0f0d6;}
</style>
</head>
<body>

<header>
<h1>🎮 ZAZZ STORE</h1>
<p>Pilih game & paket, langsung kirim data ke WhatsApp</p>
</header>

<main>
<div class="topup-form" id="topupFormContainer">
<h2>Form Top-Up</h2>

<div id="gameSelection">
    <div class="game-box" data-game="ff">Free Fire</div>
    <div class="game-box" data-game="ml">Mobile Legends</div>
    <div class="game-box" data-game="roblox">Roblox</div>
</div>

<div id="extraFields"></div>

<label for="package">Pilih Paket:</label>
<select id="package" required>
    <option value="">-- Pilih Paket --</option>
</select>

<div id="specialOffers">
    <h3>🎁 Penawaran Spesial FF (Pilih 1)</h3>
    <label><input type="radio" name="ffOffer" value="BP Card - Rp 46.000"> BP Card - Rp 46.000</label>
    <label><input type="radio" name="ffOffer" value="Member Mingguan - Rp 30.000"> Member Mingguan - Rp 30.000</label>
    <label><input type="radio" name="ffOffer" value="Member Bulanan - Rp 90.000"> Member Bulanan - Rp 90.000</label>
    <label><input type="radio" name="ffOffer" value="Mingguan Elit - Rp 20.000"> Mingguan Elit - Rp 20.000</label>
</div>

<div id="mlSpecialItems">
    <h3>🎁 Special Items ML (Pilih 1)</h3>
    <label><input type="radio" name="mlSpecial" value="Weekly Elite Pack - Rp 15.510"> Weekly Elite Pack - Rp 15.510</label>
    <label><input type="radio" name="mlSpecial" value="Weekly Diamonds Pass - Rp 27.879"> Weekly Diamonds Pass - Rp 27.879</label>
    <label><input type="radio" name="mlSpecial" value="2x Weekly Diamonds Pass - Rp 57.998"> 2x Weekly Diamonds Pass - Rp 57.998</label>
    <label><input type="radio" name="mlSpecial" value="Monthly Epic Pack - Rp 68.751"> Monthly Epic Pack - Rp 68.751</label>
</div>

<button id="btnTopup">Top-Up Sekarang</button>

<div id="confirmation">
    <h3>🎉 Data Top-Up Siap Dikirim!</h3>
    <p id="confirmText"></p>
    <button id="btnKirim">Kirim ke WhatsApp</button>
</div>

</div>
</main>

<script>
function formatPrice(num){ return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g,"."); }

const packages={
    ff:[
        {name:"12 Diamond", price:3000},{name:"50 Diamond", price:9000},{name:"70 Diamond", price:11000},{name:"91 Diamond", price:14000},
        {name:"140 Diamond", price:21000},{name:"355 Diamond", price:51000},{name:"720 Diamond", price:101000},{name:"1.450 Diamond", price:201000},
        {name:"2.180 Diamond", price:301000},{name:"3.640 Diamond", price:501000},{name:"7.290 Diamond", price:1001000},{name:"36.500 Diamond", price:5001000},
        {name:"73.100 Diamond", price:10001000}
    ],
    ml:[
        {name:"10 Diamonds", price:5053},{name:"11 Diamonds", price:4847},{name:"12 Diamonds", price:5512},{name:"14 Diamonds", price:6070},
        {name:"50 Diamonds", price:13000},{name:"70 Diamonds", price:15000},{name:"91 Diamonds", price:18000},{name:"140 Diamonds", price:25000}
    ],
    roblox:[
        {name:"50 Robux", price:10000, note:"Buat GamePass senilai 72 YA!"},
        {name:"100 Robux", price:20000, note:"Buat GamePass senilai 143 YA!"},
        {name:"150 Robux", price:25000, note:"Buat GamePass senilai 215 YA!"},
        {name:"200 Robux", price:30000, note:"Buat GamePass senilai 286 YA!"}
    ]
};

let currentGame="", currentUser="", currentPackage="", currentOffer="", totalPrice=0;
const extraFields=document.getElementById("extraFields");
const packageSelect=document.getElementById("package");
const specialOffers=document.getElementById("specialOffers");
const mlSpecialItems=document.getElementById("mlSpecialItems");
const gameSelection=document.getElementById("gameSelection");
const btnTopup=document.getElementById("btnTopup");
const confirmation=document.getElementById("confirmation");
const confirmText=document.getElementById("confirmText");
const btnKirim=document.getElementById("btnKirim");

document.querySelectorAll('.game-box').forEach(box=>{
    box.addEventListener('click',()=>{
        currentGame=box.dataset.game;
        packageSelect.innerHTML='<option value="">-- Pilih Paket --</option>';
        extraFields.innerHTML='';
        specialOffers.style.display='none';
        mlSpecialItems.style.display='none';

        if(packages[currentGame]){
            packages[currentGame].forEach(p=>{
                const opt=document.createElement('option');
                opt.value=JSON.stringify(p);
                opt.text=`${p.name} - Rp ${formatPrice(p.price)}`;
                packageSelect.appendChild(opt);
            });
        }

        if(currentGame==="ff"){ extraFields.innerHTML='<label>ID FF:</label><input type="text" id="ffID" placeholder="Masukkan ID FF" required>'; specialOffers.style.display='block'; }
        if(currentGame==="ml"){ extraFields.innerHTML='<label>ID ML:</label><input type="text" id="mlID" placeholder="Masukkan ID ML" required><label>Server:</label><input type="text" id="mlServer" placeholder="Masukkan Server" required>'; mlSpecialItems.style.display='block'; }
        if(currentGame==="roblox"){ extraFields.innerHTML='<label>Username Roblox:</label><input type="text" id="rbxUser" placeholder="Masukkan Username" required>'; }
    });
});

btnTopup.addEventListener('click',()=>{
    const pkgValue=packageSelect.value;
    if(!pkgValue||!currentGame){ alert("Pilih game & paket dulu!"); return; }
    const pkg=JSON.parse(pkgValue);

    if(currentGame==="ff") currentUser=document.getElementById("ffID").value;
    if(currentGame==="ml") currentUser=document.getElementById("mlID").value+' / '+document.getElementById("mlServer").value;
    if(currentGame==="roblox") currentUser=document.getElementById("rbxUser").value;

    currentPackage=pkg;

    // cek penawaran
    currentOffer="";
    totalPrice=pkg.price;
    if(currentGame==="ff"){
        const selOffer=document.querySelector('input[name="ffOffer"]:checked');
        if(selOffer){ currentOffer=selOffer.value; totalPrice+=parseInt(selOffer.value.replace(/[^0-9]/g,'')); }
    }
    if(currentGame==="ml"){
        const selOffer=document.querySelector('input[name="mlSpecial"]:checked');
        if(selOffer){ currentOffer=selOffer.value; totalPrice+=parseInt(selOffer.value.replace(/[^0-9]/g,'')); }
    }

    // Untuk Roblox, tampilkan catatan
    if(currentGame==="roblox" && currentPackage.note){
        currentOffer=currentPackage.note;
    }

    gameSelection.style.display='none';
    extraFields.style.display='none';
    packageSelect.style.display='none';
    specialOffers.style.display='none';
    mlSpecialItems.style.display='none';
    btnTopup.style.display='none';

    confirmText.innerText=
`Nama Game: ${currentGame.toUpperCase()}
Username/ID: ${currentUser}
Paket: ${currentPackage.name}
Penawaran Spesial: ${currentOffer || '-'}
Harga: Rp ${formatPrice(totalPrice)}`;

    confirmation.style.display='block';
});

btnKirim.addEventListener('click',()=>{
    if(!currentPackage||!currentGame||!currentUser){ alert("Data belum lengkap!"); return; }

    const waNumber="62882008584519"; // nomor WA tujuan diperbarui
    const message=encodeURIComponent(
`Nama Game: ${currentGame.toUpperCase()}
Username/ID: ${currentUser}
Paket: ${currentPackage.name}
Penawaran Spesial: ${currentOffer || '-'}
Harga: Rp ${formatPrice(totalPrice)}`
    );

    window.open(`https://wa.me/${waNumber}?text=${message}`, '_blank');
});
</script>

</body>
</html>
